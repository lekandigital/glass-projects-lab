<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Glass Three Integration</title>
  </head>
  <body>
    <div id="app">
      <canvas id="scene"></canvas>
      <aside id="controls">
        <h1>Three WebGPU</h1>
        <label>
          Blur
          <input id="blur" type="range" min="0" max="40" step="0.5" value="18" />
        </label>
        <label>
          Spacing
          <input id="spacing" type="range" min="-24" max="80" step="1" value="26" />
        </label>
        <label>
          Distance
          <input id="distance" type="range" min="-180" max="180" step="1" value="-50" />
        </label>
        <label>
          Tint
          <input id="tint" type="range" min="0" max="1" step="0.01" value="0.38" />
        </label>
      </aside>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
