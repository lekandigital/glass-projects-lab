<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>IOS Liquid Glass</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <body>
  <!-- Glass effect draggable card -->
  <div class="d-glass-card liquid-glass">
    <div class="d-glass-card-morph"></div>
    <div class="d-glass-card-corner"></div>
    <div class="d-glass-card-border"></div>
    <div class="d-glass-card-item">Drag me</div>
  </div>

  <!-- SVG filter for glass distortion effect -->
  <!-- Place this SVG filter once in your root component or App.vue -->
  <svg style="display: none" xmlns="http://www.w3.org/2000/svg">
    <filter id="liquid-glass">
      <!-- Adjust baseFrequency, numOctaves, and seed to modify distortion pattern -->
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.02" numOctaves="2" seed="5" result="turbulence" />
      <!-- Increase scale value for stronger distortion effect -->
      <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="40" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
</body>
    <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/Draggable.min.js'></script><script  src="./script.js"></script>

  </body>
  
</html>
