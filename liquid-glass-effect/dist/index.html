<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Liquid Glass Effect</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <button class="glass-button">
      <span>CRYSTAL</span>
    </button>

    <svg style="position: absolute; width: 0; height: 0">
      <filter
        id="glass"
        x="-50%"
        y="-50%"
        width="200%"
        height="200%"
        primitiveUnits="objectBoundingBox"
      >
        <feImage
          
          x="-50%"
          y="-50%"
          width="200%"
          height="200%"
          result="map"
        />
        <feGaussianBlur in="SourceGraphic" stdDeviation="0.02" result="blur" />
        <feDisplacementMap
          id="disp"
          in="blur"
          in2="map"
          scale="0.8"
          xChannelSelector="R"
          yChannelSelector="G"
        ></feDisplacementMap>
      </filter>
    </svg>
    <script  src="./script.js"></script>

  </body>
  
</html>
